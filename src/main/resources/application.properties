spring.application.name=credtrack-ai-agent
server.port=8081

# Match backend's snake_case so analytics JSON returned by the AI agent
# deserializes cleanly into CardSpendingResponse / UtilityAnalyticsResponse on the backend side.
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false

# ── AI Provider — Ollama (local, free) ────────────────────────────────────────
# Make sure Ollama is running: ollama serve
# Swap starter in pom.xml + these properties to change provider (zero code changes)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.1
spring.ai.ollama.chat.options.num-predict=1024
spring.ai.ollama.chat.options.format=json

# ── Google / Gmail ─────────────────────────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

# ── Existing backend ───────────────────────────────────────────────────────────
backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}
backend.service-key=${INTERNAL_SERVICE_KEY:changeme-dev-key}

# ── Polling (default 1 hour — statements are monthly) ─────────────────────────
gmail.poll-interval-ms=${GMAIL_POLL_INTERVAL_MS:3600000}

# ── Transaction scan interval ─────────────────────────────────────────────────
# How often to re-scan Gmail for new transaction alert emails per card.
# Default: 1440 min (24h) — sufficient for daily credit card alerts.
# For testing: set TRANSACTION_SCAN_INTERVAL_MINUTES=5 in your .env
transaction.scan.interval-minutes=${TRANSACTION_SCAN_INTERVAL_MINUTES:1440}
