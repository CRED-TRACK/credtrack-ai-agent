akka {
  actor.provider = cluster

  cluster {
    # Single-node seed — the node joins itself on startup.
    # Keep a stable single-node seed by default. If needed later, override the
    # entire list with AKKA_SEED_NODES in HOCON list form.
    seed-nodes = ["akka://credtrack-ai@127.0.0.1:2551"]
    seed-nodes = ${?AKKA_SEED_NODES}
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
  }

  remote.artery {
    transport = tcp
    canonical.hostname = "127.0.0.1"
    canonical.hostname = ${?AKKA_CANONICAL_HOSTNAME}
    canonical.port = 2551
    canonical.port = ${?AKKA_CANONICAL_PORT}
  }

  persistence {
    journal.plugin  = "akka.persistence.journal.inmem"

    snapshot-store {
      plugin = "akka.persistence.snapshot-store.local"
      local.dir = "/tmp/akka-snapshots"
      local.dir = ${?AKKA_SNAPSHOT_DIR}
    }
  }
}
