services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ai-agent:
    build: .
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - LLM_PRIMARY_PROVIDER=${LLM_PRIMARY_PROVIDER:-ollama}
      - LLM_FALLBACK_PROVIDER=${LLM_FALLBACK_PROVIDER:-none}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}
      - GEMINI_MAX_OUTPUT_TOKENS=${GEMINI_MAX_OUTPUT_TOKENS:-1024}
      - GEMINI_TEMPERATURE=${GEMINI_TEMPERATURE:-0.1}
      - GEMINI_TIMEOUT_SECONDS=${GEMINI_TIMEOUT_SECONDS:-60}
      - BACKEND_BASE_URL=${BACKEND_BASE_URL}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - AKKA_CANONICAL_HOSTNAME=127.0.0.1
      - AKKA_CANONICAL_PORT=2551
      - AKKA_SNAPSHOT_DIR=/tmp/akka-snapshots
      - GMAIL_POLL_INTERVAL_MS=${GMAIL_POLL_INTERVAL_MS:-10800000}
      - TRANSACTION_SCAN_INTERVAL_MINUTES=${TRANSACTION_SCAN_INTERVAL_MINUTES:-1440}
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
